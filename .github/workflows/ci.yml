name: CI (Playwright + k6)

on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  ui:
    name: UI tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run UI tests
        run: npm test

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Upload raw test results (traces/videos)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results

  perf:
    name: Performance tests (k6 via Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: ui

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Run k6 (Docker) + generate artifacts
        run: npm run perf:ci

      - name: Upload k6 summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-summary
          path: performance/output/summary.json

      - name: Upload generated performance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-report
          path: performance/output/performance-report.generated.md
