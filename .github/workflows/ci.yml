name: CI (Playwright + k6 + Pages)

on:
  pull_request:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  ui-tests:
    name: UI Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run UI tests
        run: npm test

      - name: Upload HTML report (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: error
          retention-days: 7

      - name: Upload raw test results (traces/videos)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results
          if-no-files-found: ignore
          retention-days: 7

  performance-tests:
    name: Performance Tests (k6 via Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Run k6 (Docker) + generate artifacts
        run: npm run perf:ci

      - name: Upload k6 summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-summary
          path: performance/output/summary.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload generated performance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-report
          path: performance/output/performance-report.generated.md
          if-no-files-found: ignore
          retention-days: 7

  publish-playwright-report:
    name: Publish Playwright report to GitHub Pages (latest)
    runs-on: ubuntu-latest
    needs: ui-tests
    # Publikuj tylko dla main (żeby nie mieszać raportów z PR-ów)
    if: always() && github.ref == 'refs/heads/main'
    timeout-minutes: 10

    steps:
      - name: Download Playwright report artifact
        uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4