name: CI (Playwright + k6)

on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  ui-tests:
    name: UI tests (Playwright)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run UI tests
        run: npm test

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results

 publish-playwright-report:
  name: Publish Playwright report to GitHub Pages (latest)
  runs-on: ubuntu-latest
  needs: ui-tests
  if: always()

  steps:
    - name: Download Playwright report artifact
      uses: actions/download-artifact@v4
      with:
        name: playwright-report
        path: playwright-report

    - name: Configure Pages
      uses: actions/configure-pages@v5

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: playwright-report

    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v4
        
  perf:
    name: Performance tests (k6 via Docker)
    runs-on: ubuntu-latest
    needs: ui-tests

    steps:
      - uses: actions/checkout@v4

      - name: Run k6 performance test
        run: npm run perf

      - name: Upload k6 summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-summary
          path: performance/output/summary.json

      - name: Upload performance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-report
          path: performance/output/performance-report.generated.md
          